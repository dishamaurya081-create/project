<!DOCTYPE html>
<html>
<head>
  <title>Momentum - Adaptive Programming Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top left, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 48px;
      margin: 0;
      letter-spacing: 2px;
    }

    .header p {
      opacity: 0.8;
      margin-top: 10px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 25px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    select, input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .task {
      display: flex;
      align-items: center;
      margin: 10px 0;
    }

    .task input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
      margin-top: 15px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, #22c55e, #3b82f6);
      width: 0%;
      transition: 0.4s;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }

    .stat-box {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      flex: 1;
      margin: 5px;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>⚡ Momentum</h1>
    <p>Adaptive Programming Planner</p>
  </div>

  <div class="card">
    <select id="language">
      <option>Python</option>
      <option>JavaScript</option>
      <option>C++</option>
    </select>

    <input type="number" id="days" placeholder="Enter number of days">

    <button onclick="generatePlan()">Generate Plan</button>
  </div>

  <div class="card">
    <div id="plan"></div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="stats">
      <div class="stat-box" id="streakBox">🔥 Streak: 0</div>
      <div class="stat-box" id="levelBox">🏆 Level: 1</div>
      <div class="stat-box" id="xpBox">⭐ XP: 0</div>
    </div>

    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let xp = 0;
let level = 1;
let streak = 0;

function generatePlan() {
  const days = document.getElementById("days").value;
  const planDiv = document.getElementById("plan");
  planDiv.innerHTML = "";

  for (let i = 1; i <= days; i++) {
    planDiv.innerHTML += `
      <div class="task">
        <input type="checkbox" onchange="updateProgress()">
        Day ${i} - Topic
      </div>
    `;
  }
}

function updateProgress() {
  const checkboxes = document.querySelectorAll("input[type='checkbox']");
  const checked = document.querySelectorAll("input[type='checkbox']:checked");

  let progress = (checked.length / checkboxes.length) * 100;
  document.getElementById("progressFill").style.width = progress + "%";

  xp = checked.length * 10;
  level = Math.floor(xp / 50) + 1;

  document.getElementById("xpBox").innerText = "⭐ XP: " + xp;
  document.getElementById("levelBox").innerText = "🏆 Level: " + level;

  renderChart(checked.length, checkboxes.length);
}

function renderChart(done, total) {
  const ctx = document.getElementById('chart');

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Completed', 'Remaining'],
      datasets: [{
        data: [done, total - done],
        backgroundColor: ['#22c55e', '#3b82f6']
      }]
    }
  });
}
</script>

</body>
</html>
