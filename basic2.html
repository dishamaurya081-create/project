<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookNest | Online Book Store</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style2.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="navbar">
    <div class="logo">📚 BookNest</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- ===== HERO SECTION ===== -->
<section class="hero">
    <div class="hero-text">
        <h1>Find Your Next <br> Favorite Book</h1>
        <p>Best books for every reader</p>
        <button>Shop Now</button>
    </div>

    <div class="hero-image">
        <img src="https://static.vecteezy.com/system/resources/thumbnails/044/280/984/small/stack-of-books-on-a-brown-background-concept-for-world-book-day-photo.jpg" alt="Books">
    </div>
</section>

<!-- ===== CATEGORIES ===== -->
<section class="categories">
    <div class="category">Fiction</div>
    <div class="category">Exams</div>
    <div class="category">Novels</div>
    <div class="category">Self Help</div>
</section>

<!-- ===== FEATURED BOOKS ===== -->
<section class="products">
    <h2>Featured Books</h2>

    <div class="product-container">
        <div class="card">
            <img src="images/book1.jpg" alt="Book">
            <h3>The Silent Forest</h3>
            <p>₹350</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/book2.jpg" alt="Book">
            <h3>Ace the Exams</h3>
            <p>₹299</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/book3.jpg" alt="Book">
            <h3>The Lost Kingdom</h3>
            <p>₹420</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/book4.jpg" alt="Book">
            <h3>Mindful Living</h3>
            <p>₹380</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
    <p>© 2026 BookNest | All Rights Reserved</p>
</footer>

</body>
</html>
