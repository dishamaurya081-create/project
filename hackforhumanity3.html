<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindCare Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:#111;
}

h1{
    text-align:center;
    margin-top:30px;
    color:white;
}

.dashboard{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    padding:30px 15px;
    max-width:800px;
    margin:auto;
}

.card{
    width:100%;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

.mood-buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:10px;
}

button{
    padding:8px 18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    color:#764ba2;
    font-size:16px;
}

textarea{
    width:95%;
    height:80px;
    border-radius:10px;
    border:none;
    padding:10px;
}

.circle-wrapper{
    position:relative;
    width:220px;
    height:220px;
    margin:auto;
}

.center-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:24px;
    font-weight:bold;
    color:#000;
    z-index:10;
}

.exercise-box{
    margin-top:10px;
    padding:12px;
    background:rgba(255,255,255,0.4);
    border-radius:12px;
    font-size:14px;
}

.journal-box{
    background:rgba(255,255,255,0.4);
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    text-align:left;
}

.journal-box small{
    display:block;
    margin-top:5px;
    font-size:12px;
}

.reset-card{
    display:flex;
    justify-content:center;
    align-items:center;
}

.reset-btn{
    background:#ff5252;
    color:white;
    padding:10px 25px;
}
</style>
</head>

<body>

<h1>🌿 MindCare Pro</h1>

<div class="dashboard">

<div class="card">
<h2>How are you feeling?</h2>
<div class="mood-buttons">
<button onclick="logMood('Happy')">😊</button>
<button onclick="logMood('Sad')">😔</button>
<button onclick="logMood('Angry')">😡</button>
<button onclick="logMood('Anxious')">😰</button>
</div>

<div id="tip"></div>

<div id="exerciseBox" class="exercise-box" style="display:none;">
<b>Recommended Exercise:</b>
<div id="exerciseText"></div>
</div>
</div>

<div class="card">
<h2>Today's Emotional Overview</h2>
<div class="circle-wrapper">
<canvas id="circleChart"></canvas>
<div class="center-text" id="centerText">0%</div>
</div>
<div id="dominantMood"></div>
</div>

<div class="card">
<h2>Mood Trend</h2>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h2>Mood History</h2>
<div id="history"></div>
</div>

<div class="card">
<h2>Journal</h2>
<textarea id="journal"></textarea><br><br>
<button onclick="saveJournal()">Save</button>
<div id="journalList"></div>
</div>

<div class="card reset-card">
<button class="reset-btn" onclick="resetAll()">Reset All Data</button>
</div>

</div>

<script>
const moodInfo={
Happy:{score:90,tip:"Keep spreading positivity 🌟",exercise:"Write 3 things you're grateful for."},
Sad:{score:40,tip:"It’s okay to rest.",exercise:"Write your feelings for 5 minutes."},
Angry:{score:50,tip:"Pause before reacting.",exercise:"Inhale 4s, hold 4s, exhale 6s."},
Anxious:{score:45,tip:"Ground yourself.",exercise:"5-4-3-2-1 grounding technique."}
};

let circleChart,lineChart;

function logMood(mood){
document.getElementById("tip").innerText=moodInfo[mood].tip;
document.getElementById("exerciseBox").style.display="block";
document.getElementById("exerciseText").innerText=moodInfo[mood].exercise;

let moods=JSON.parse(localStorage.getItem("moods"))||[];
moods.push({mood:mood,date:new Date().toLocaleString(),score:moodInfo[mood].score});
localStorage.setItem("moods",JSON.stringify(moods));

updateDashboard();
}

function updateDashboard(){
let moods=JSON.parse(localStorage.getItem("moods"))||[];
displayHistory();

let today=new Date().toDateString();
let todayMoods=moods.filter(m=>new Date(m.date).toDateString()===today);

if(todayMoods.length===0)return;

let total=0;
let count={Happy:0,Sad:0,Angry:0,Anxious:0};

todayMoods.forEach(m=>{
total+=m.score;
count[m.mood]++;
});

let avg=Math.round(total/todayMoods.length);
document.getElementById("centerText").innerText=avg+"%";

let dominant=Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b);
document.getElementById("dominantMood").innerText="Dominant Mood: "+dominant;

if(circleChart) circleChart.destroy();
circleChart=new Chart(document.getElementById("circleChart"),{
type:"doughnut",
data:{
labels:["Happy","Sad","Angry","Anxious"],
datasets:[{
data:[count.Happy,count.Sad,count.Angry,count.Anxious],
backgroundColor:["#00e676","#ff5252","#ff9800","#40c4ff"]
}]
},
options:{
cutout:"75%",
plugins:{
legend:{labels:{color:"#000"}}
}
}
});

updateLineGraph(moods);
}

function updateLineGraph(moods){
if(lineChart) lineChart.destroy();

lineChart=new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:moods.map(m=>m.date),
datasets:[{
label:"Mood Score",
data:moods.map(m=>m.score),
borderColor:"#000",
backgroundColor:"rgba(0,0,0,0.1)",
fill:true,
tension:0.3
}]
},
options:{
plugins:{
legend:{labels:{color:"#000"}}
},
scales:{
x:{ticks:{color:"#000"}},
y:{ticks:{color:"#000"}}
}
}
});
}

function displayHistory(){
let moods=JSON.parse(localStorage.getItem("moods"))||[];
let div=document.getElementById("history");
div.innerHTML="";
moods.slice(-5).reverse().forEach(m=>{
div.innerHTML+=`<div>${m.mood} - ${m.date}</div>`;
});
}

function saveJournal(){
let text=document.getElementById("journal").value.trim();
if(text==="") return;

let journals=JSON.parse(localStorage.getItem("journals"))||[];
journals.push({text:text,date:new Date().toLocaleString()});
localStorage.setItem("journals",JSON.stringify(journals));

document.getElementById("journal").value="";
displayJournals();
}

function displayJournals(){
let journals=JSON.parse(localStorage.getItem("journals"))||[];
let list=document.getElementById("journalList");
list.innerHTML="";
journals.slice(-5).reverse().forEach(j=>{
list.innerHTML+=`
<div class="journal-box">
${j.text}
<small>${j.date}</small>
</div>`;
});
}

function resetAll(){
localStorage.clear();
location.reload();
}

updateDashboard();
displayJournals();
</script>

</body>
</html>
